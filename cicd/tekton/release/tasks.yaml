---
apiVersion: tekton.dev/v1alpha1
kind: Task
metadata:
  name: release-notes
spec:
  #  stepTemplate:
  #    env:
  #      - name: SLACK_FAILED_WEBHOOK_URL
  #        valueFrom:
  #          secretKeyRef:
  #            name: slack-webhook
  #            key: SLACK_FAILED_WEBHOOK_URL
  params:
    - name: gitrevision
  resources:
    inputs:
      - name: git-repo
        type: git
  steps:
    - name: release-notes
      image: gcr.io/engineering-devops/repo
      workingDir: /workspace/git-repo
      env:
        - name: GIT_TAG_NAME
          value: $(params.gitrevision)
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-token-secret)
              key: bot-token
      script: |
        #!/usr/bin/env bash
        git fetch --tags
        git checkout "${GIT_TAG_NAME}"
        make -f docker/cli-tools/repo/Makefile release
