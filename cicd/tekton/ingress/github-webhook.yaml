---
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: tekton-webhook
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /
            backend:
              serviceName: el-pr-build-trigger
              servicePort: 8080
